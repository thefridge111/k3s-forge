apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  namespace: metallb-system
  name: home-pool
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  addresses:
  - 192.168.1.235-192.168.1.250

apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  namespace: metallb-system
  name: home-adv
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ipAddressPools:
  - home-pool
